name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        run: |
          mkdir -p profile
          curl -sS -o profile/stats.svg \
            "https://github-readme-stats.vercel.app/api?username=${{ github.repository_owner }}&show_icons=true&hide_title=true&rank_icon=github&include_all_commits=true&theme=tokyonight&hide_border=true"

      - name: Generate top languages card
        run: |
          curl -sS -o profile/top-langs.svg \
            "https://github-readme-stats.vercel.app/api/top-langs/?username=${{ github.repository_owner }}&layout=compact&langs_count=6&theme=tokyonight&hide_border=true"

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/stats.svg profile/top-langs.svg
          git commit -m "chore: update README cards" || exit 0
          git push
